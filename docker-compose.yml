services:
  postgres:
    image: postgres:16-alpine
    container_name: nexkeep-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexkeep
      POSTGRES_PASSWORD: nexkeep
      POSTGRES_DB: nexkeep_dev
    ports:
      - "5432:5432"
    volumes:
      - nexkeep_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexkeep -d nexkeep_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  nexkeep_pgdata:
